version: '3.8'

services:
  ticket-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ticket-classifier:latest
    container_name: ticket-classifier-api
    ports:
      - "3000:3000"
    env_file:
      # Loads all variables from the .env file (ANTHROPIC_API_KEY, LLM_MODE, etc.)
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=./data/tickets.db
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LLM_MODE=${LLM_MODE:-mock}
    volumes:
      # Map host directories to container persistent volumes
      - ./data:/usr/src/app/data
      - ./logs:/usr/src/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
